<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход в LifeHub</title>
  </head>
  <body style="margin:0;background:#f7f3ea;font-family:Arial,Helvetica,sans-serif;color:#22261f;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f3ea;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#fffdf6;border:1px solid #e3ddce;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="background:#263028;padding:28px;">
                <div style="font-size:13px;font-weight:800;letter-spacing:0;color:#daff72;text-transform:uppercase;">LifeHub</div>
                <h1 style="margin:10px 0 0;font-size:30px;line-height:1.08;color:#fff9ea;">Вход в семейный центр дел</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 18px;font-size:16px;line-height:1.5;color:#3c4138;">
                  Нажми кнопку ниже, чтобы войти в LifeHub. Пароль не нужен.
                </p>
                <p style="margin:0 0 24px;font-size:14px;line-height:1.5;color:#707568;">
                  Если это был не ты, просто проигнорируй письмо.
                </p>
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#daff72;color:#22261f;border:1px solid #22261f;border-radius:999px;padding:14px 22px;font-size:15px;font-weight:800;text-decoration:none;">
                  Войти в LifeHub
                </a>
                <p style="margin:24px 0 0;font-size:12px;line-height:1.5;color:#8b8c84;">
                  Если кнопка не открывается, скопируй ссылку:<br />
                  <span style="word-break:break-all;color:#4f574b;">{{ .ConfirmationURL }}</span>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
